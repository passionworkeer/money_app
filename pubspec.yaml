name: ai_expense_tracker
description: "AI记账本 - 智能语音记账应用"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.4.0

  # Navigation
  go_router: ^13.0.0

  # Database
  sqflite: ^2.3.0
  path: ^1.8.3

  # Voice Recognition
  speech_to_text: ^6.3.0

  # AI
  http: ^1.1.0

  # Charts
  fl_chart: ^0.66.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.2.0

  # Export & Share - Use older version to avoid app_links issue
  share_plus: ^7.0.0
  path_provider: ^2.1.1
  file_picker: ^6.1.1

  # Calendar
  table_calendar: ^3.0.9

  # Notifications
  flutter_local_notifications: ^17.2.1

  # Sync Services
  supabase_flutter: ^2.0.0
  xml: ^6.5.0
  # minio_new: any  # Conflicts with http ^1.1.0
  shared_preferences: ^2.2.2
  crypto: ^3.0.3

  # Force older version of app_links to fix build issue
  app_links: 5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  integration_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true
